# NerdOS GRUB2 Configuration
#
# This file configures GRUB2 to boot NerdOS.
# It supports both BIOS and UEFI boot modes.
#
# Place this file at /boot/grub/grub.cfg on the boot partition.

# ---------------------------------------------------------------------------
# GRUB Settings
# ---------------------------------------------------------------------------

# Set timeout to 5 seconds (allows user to interrupt if needed)
set timeout=5

# Set default menu entry
set default=0

# Enable graphics terminal for UEFI/BIOS
set gfxmode=auto
set gfxpayload=keep

# Serial console support (for headless systems)
# Uncomment to enable serial output on COM1 at 115200 baud
# serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
# terminal_input --append serial
# terminal_output --append serial

# ---------------------------------------------------------------------------
# Menu Entry: NerdOS (Normal Boot)
# ---------------------------------------------------------------------------

menuentry "NerdOS" {
    # Multiboot2 header location
    # GRUB will look for the Multiboot2 magic at the beginning of the file
    multiboot2 /boot/nerdos.bin

    # Boot into graphics mode (optional, falls back to text mode)
    # set gfxpayload=1024x768x32

    # Pass kernel command line arguments
    # module2 /boot/initrd.img initrd
}

# ---------------------------------------------------------------------------
# Menu Entry: NerdOS (Debug Mode)
# ---------------------------------------------------------------------------

menuentry "NerdOS (Debug Mode)" {
    multiboot2 /boot/nerdos.bin debug=1 loglevel=debug
    # Enable serial output for kernel debugging
}

# ---------------------------------------------------------------------------
# Menu Entry: NerdOS (Single User / Recovery)
# ---------------------------------------------------------------------------

menuentry "NerdOS (Recovery Mode)" {
    multiboot2 /boot/nerdos.bin single init=/bin/sh
}

# ---------------------------------------------------------------------------
# Menu Entry: Memory Test (Memtest86+)
# ---------------------------------------------------------------------------

menuentry "Memory Test" {
    if [ -f /boot/memtest86+.bin ]; then
        linux16 /boot/memtest86+.bin
    else
        echo "Memtest86+ not found"
        sleep 3
    fi
}

# ---------------------------------------------------------------------------
# Menu Entry: UEFI Firmware Settings
# ---------------------------------------------------------------------------

if [ ${grub_platform} == "efi" ]; then
    menuentry "UEFI Firmware Settings" {
        fwsetup
    }
fi

# ---------------------------------------------------------------------------
# Menu Entry: Reboot
# ---------------------------------------------------------------------------

menuentry "Reboot" {
    reboot
}

# ---------------------------------------------------------------------------
# Menu Entry: Power Off
# ---------------------------------------------------------------------------

menuentry "Power Off" {
    halt
}
