# =============================================================================
# BoundaryOS GRUB2 Configuration
# =============================================================================
# DESIGN NOTE: This menu provides multiple boot modes reflecting the 
# philosophical laws of BoundaryOS. Each mode serves a different purpose.
#
# LAWS: Nothing is Hidden (all modes visible)
#       Nothing is Owned by the System (user chooses how to boot)
# =============================================================================

set timeout=5
set default=0

# -----------------------------------------------------------------------------
# Main Menu Entries
# -----------------------------------------------------------------------------

menuentry "BoundaryOS [Normal]" --class boundaryos {
    echo "Loading BoundaryOS kernel..."
    multiboot2 /boot/boundaryos
    boot
}

menuentry "BoundaryOS [Safe Mode]" --class boundaryos {
    echo "Loading BoundaryOS in safe mode (minimal drivers)..."
    multiboot2 /boot/boundaryos safemode=1
    boot
}

menuentry "BoundaryOS [Debug Mode]" --class boundaryos {
    echo "Loading BoundaryOS with debug output..."
    multiboot2 /boot/boundaryos debug=1
    serial --unit=0 --speed=115200
    terminal_input serial
    terminal_output serial
    boot
}

menuentry "BoundaryOS [Naked Mode]" --class boundaryos {
    echo "WARNING: Naked Mode grants full kernel access"
    echo "All actions will be logged to audit fossil"
    multiboot2 /boot/boundaryos naked=1
    boot
}

# -----------------------------------------------------------------------------
# Recovery Submenu
# -----------------------------------------------------------------------------

submenu "Recovery Options" --class recovery {
    
    menuentry "Boot from Last Known Good Snapshot" --class snapshot {
        echo "Attempting to load last stable World image..."
        multiboot2 /boot/boundaryos snapshot=last_good
        boot
    }
    
    menuentry "Reset Covenant to Default" --class covenant {
        echo "Loading with default security covenant..."
        multiboot2 /boot/boundaryos covenant_reset=1
        boot
    }
    
    menuentry "Boot with Fossil Heap Compaction" --class fossil {
        echo "Running compaction on boot..."
        multiboot2 /boot/boundaryos compact_fossils=1
        boot
    }
    
    menuentry "Return to Main Menu" {
        configfile (/boot)/grub.cfg
    }
}

# -----------------------------------------------------------------------------
# About Screen
# -----------------------------------------------------------------------------

menuentry "About BoundaryOS" --class info {
    clear
    echo ""
    echo "╔══════════════════════════════════════════════╗"
    echo "║           BOUNDARYOS v0.1.0                  ║"
    echo "╠══════════════════════════════════════════════╣"
    echo "║  A living image operating system             ║"
    echo "║  Capability-secure, temporal, inspectable    ║"
    echo "╠══════════════════════════════════════════════╣"
    echo "║  Five Philosophical Laws:                    ║"
    echo "║  1. Nothing is Hidden                        ║"
    echo "║  2. Nothing is Irrevocable by Accident       ║"
    echo "║  3. Nothing is Safe by Obscurity             ║"
    echo "║  4. Nothing is a Magic Incantation           ║"
    echo "║  5. Nothing is Owned by the System           ║"
    echo "╚══════════════════════════════════════════════╝"
    echo ""
    echo "Press any key to return to main menu..."
    sleep --interruptible 10
}

# -----------------------------------------------------------------------------
# UEFI Boot Entry (if applicable)
# -----------------------------------------------------------------------------

if [ "${grub_platform}" = "efi" ]; then
    menuentry "BoundaryOS [UEFI Mode]" --class efi {
        echo "Loading BoundaryOS in UEFI mode..."
        multiboot2 /boot/boundaryos efi=1
        boot
    }
fi
