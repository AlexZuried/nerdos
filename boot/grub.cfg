# =============================================================================
# BoundaryOS GRUB2 Configuration
# PHASE 2: Basic assembly boot stub, CPU detection (continued)
# LAWS: Nothing is Hidden, Nothing is a Magic Incantation
# DESIGN NOTE: Multiboot2 specification compliant configuration
#              Supports both BIOS and UEFI boot modes
# =============================================================================

set timeout=5
set default=0

menuentry "BoundaryOS v0.1.0" --class boundaryos {
    # Load multiboot2 kernel
    multiboot2 /boot/boundaryos boundaryos
    
    # Optional modules can be added here
    # module2 /boot/initrd initrd
    
    # Set boot parameters
    echo "Booting BoundaryOS..."
    echo "Philosophy: The machine is an editable, inspectable object."
}

menuentry "BoundaryOS (Safe Mode)" --class boundaryos {
    # Load multiboot2 kernel with safe mode flag
    multiboot2 /boot/boundaryos boundaryos safe_mode=1
    
    echo "Booting BoundaryOS in Safe Mode..."
    echo "Limited drivers, maximum compatibility."
}

menuentry "BoundaryOS (Debug Mode)" --class boundaryos {
    # Load multiboot2 kernel with debug flags
    multiboot2 /boot/boundaryos boundaryos debug=1 log_level=3
    
    echo "Booting BoundaryOS in Debug Mode..."
    echo "Serial output enabled, verbose logging."
}

# Recovery options
submenu "Recovery Options" {
    menuentry "Boot from previous snapshot" {
        multiboot2 /boot/boundaryos boundaryos snapshot=previous
        echo "Attempting to boot from previous World snapshot..."
    }
    
    menuentry "Reset Covenant to defaults" {
        multiboot2 /boot/boundaryos boundaryos reset_covenant=1
        echo "Covenant will be reset to boot defaults."
    }
    
    menuentry "Enter Naked Mode (Level 3)" {
        multiboot2 /boot/boundaryos boundaryos naked_boot=1
        echo "WARNING: Booting with full kernel access."
        echo "All safety membranes disabled."
    }
}

# Information about BoundaryOS
menuentry "About BoundaryOS" {
    echo ""
    echo "BoundaryOS v0.1.0 - The Living Image OS"
    echo ""
    echo "Philosophical Laws:"
    echo "  1. Nothing is Hidden"
    echo "  2. Nothing is Irrevocable by Accident"
    echo "  3. Nothing is Safe by Obscurity"
    echo "  4. Nothing is a Magic Incantation"
    echo "  5. Nothing is Owned by the System"
    echo ""
    echo "Features:"
    echo "  - Capability-based security (Unforgeable Threads)"
    echo "  - Temporal object store (Fossil Heap)"
    echo "  - Inspectable hardware drivers (Myth Layer)"
    echo "  - Signed configuration contracts (Covenant)"
    echo "  - Editable world state (Atlas)"
    echo ""
    echo "Press any key to return..."
    sleep --interruptible 10
}
